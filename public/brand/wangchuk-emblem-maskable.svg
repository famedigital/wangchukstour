<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Wangchuks Tours">
  <defs>
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#2a3d63"/>
      <stop offset="42%" stop-color="#121c33"/>
      <stop offset="100%" stop-color="#060910"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.38" cy="0.22" r="0.65">
      <stop offset="0%" stop-color="#6b8fd4" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#6b8fd4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gloss" cx="0.35" cy="0.12" r="0.55">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plate" x1="0.3" y1="0" x2="0.75" y2="1">
      <stop offset="0%" stop-color="#1c2844"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="rim" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f6e7ad"/>
      <stop offset="45%" stop-color="#d4af55"/>
      <stop offset="100%" stop-color="#8a6a28"/>
    </linearGradient>
    <linearGradient id="mark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff6d0"/>
      <stop offset="40%" stop-color="#e8c56a"/>
      <stop offset="100%" stop-color="#b08a34"/>
    </linearGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="inner" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#spot)"/>
  <rect width="512" height="512" fill="url(#gloss)"/>

  <!-- Safe-zone scale for Android maskable -->
  <g transform="translate(256 256) scale(0.78)" filter="url(#lift)">
    <circle r="168" fill="url(#rim)"/>
    <circle r="152" fill="url(#plate)"/>
    <circle r="152" fill="none" stroke="#f0d78c" stroke-opacity="0.18" stroke-width="3"/>
    <g filter="url(#inner)" transform="translate(0 18)">
      <path
        fill="url(#mark)"
        d="M-108 58 L-108 22 L-62 -48 L-28 18 L0 -86 L28 18 L62 -48 L108 22 L108 58 Z"
      />
      <path fill="#fff8de" opacity="0.55" d="M-62 -48 L-52 -30 L-72 -30 Z"/>
      <path fill="#fff8de" opacity="0.7" d="M0 -86 L12 -58 L-12 -58 Z"/>
      <path fill="#fff8de" opacity="0.55" d="M62 -48 L72 -30 L52 -30 Z"/>
    </g>
    <g transform="translate(0 -8)">
      <circle r="18" fill="url(#mark)"/>
      <circle r="10" fill="#0e1628" fill-opacity="0.45"/>
      <circle r="5.5" fill="#fff4c4"/>
      <rect x="-3.5" y="-36" width="7" height="28" rx="2" fill="url(#mark)"/>
      <rect x="-3.5" y="8" width="7" height="20" rx="2" fill="url(#mark)"/>
      <rect x="-36" y="-3.5" width="28" height="7" rx="2" fill="url(#mark)"/>
      <rect x="8" y="-3.5" width="20" height="7" rx="2" fill="url(#mark)"/>
    </g>
  </g>
</svg>
